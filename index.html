<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENRY - AI Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        .password-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .password-box { text-align: center; padding: 3rem 2.5rem; max-width: 400px; width: 90%; }
        .password-logo { font-size: 3rem; font-weight: 200; color: #00d9ff; margin-bottom: 0.5rem; letter-spacing: 0.3em; text-shadow: 0 0 30px rgba(0, 217, 255, 0.5); }
        .password-subtitle { color: rgba(255, 255, 255, 0.4); margin-bottom: 3rem; font-size: 0.875rem; font-weight: 300; letter-spacing: 0.15em; }
        .password-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 217, 255, 0.3); border-radius: 8px; padding: 1rem 1.5rem; color: #fff; font-size: 1rem; text-align: center; letter-spacing: 0.2em; margin-bottom: 1.5rem; transition: all 0.3s ease; }
        .password-input:focus { outline: none; border-color: #00d9ff; box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); background: rgba(255, 255, 255, 0.08); }
        .password-submit { width: 100%; background: rgba(0, 217, 255, 0.1); border: 1px solid rgba(0, 217, 255, 0.5); padding: 1rem 2rem; border-radius: 8px; color: #00d9ff; font-weight: 500; cursor: pointer; transition: all 0.3s ease; font-size: 0.875rem; letter-spacing: 0.15em; }
        .password-submit:hover { background: rgba(0, 217, 255, 0.15); box-shadow: 0 0 30px rgba(0, 217, 255, 0.3); }
        .password-error { color: #f44; margin-top: 1rem; font-size: 0.875rem; opacity: 0; transition: opacity 0.3s; font-weight: 300; }
        .password-error.show { opacity: 1; }
        .hidden { display: none !important; }
        .main-container { display: flex; flex-direction: column; height: 100vh; position: relative; }
        header { position: absolute; top: 0; left: 0; right: 0; padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 200; letter-spacing: 0.3em; color: #00d9ff; text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }
        .status { display: flex; align-items: center; gap: 0.75rem; font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.15em; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #0f8; box-shadow: 0 0 15px #0f8; animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .orb-container { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 400px; height: 400px; z-index: 1; }
        .orb { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle at 30% 30%, rgba(0, 217, 255, 0.4), rgba(0, 150, 255, 0.2), rgba(0, 100, 255, 0.1), transparent); box-shadow: 0 0 60px rgba(0, 217, 255, 0.6), 0 0 120px rgba(0, 217, 255, 0.4), inset 0 0 60px rgba(0, 217, 255, 0.3); animation: rotate 20s linear infinite, pulse-orb 4s ease-in-out infinite; }
        .orb::before { content: ''; position: absolute; top: 10%; left: 10%; width: 80%; height: 80%; border-radius: 50%; background: radial-gradient(circle at 40% 40%, rgba(255, 255, 255, 0.3), transparent 50%); animation: shimmer 3s ease-in-out infinite; }
        .orb::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; border-radius: 50%; border: 2px solid rgba(0, 217, 255, 0.5); animation: ring-pulse 3s ease-in-out infinite; }
        @keyframes rotate { from { transform: translate(-50%, -50%) rotate(0deg); } to { transform: translate(-50%, -50%) rotate(360deg); } }
        @keyframes pulse-orb { 0%, 100% { transform: translate(-50%, -50%) scale(1); box-shadow: 0 0 60px rgba(0, 217, 255, 0.6), 0 0 120px rgba(0, 217, 255, 0.4), inset 0 0 60px rgba(0, 217, 255, 0.3); } 50% { transform: translate(-50%, -50%) scale(1.05); box-shadow: 0 0 80px rgba(0, 217, 255, 0.8), 0 0 160px rgba(0, 217, 255, 0.6), inset 0 0 80px rgba(0, 217, 255, 0.4); } }
        @keyframes shimmer { 0%, 100% { opacity: 0.5; } 50% { opacity: 0.8; } }
        @keyframes ring-pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }
        .center-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 2; margin-top: 250px; }
        .voice-status { font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 300; }
        .input-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem 3rem 3rem 3rem; z-index: 100; }
        .input-wrapper { max-width: 800px; margin: 0 auto; position: relative; }
        .input-bar { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 1.25rem 5rem 1.25rem 2rem; color: #fff; font-size: 1rem; transition: all 0.3s ease; font-family: inherit; resize: none; min-height: 56px; max-height: 200px; }
        .input-bar:focus { outline: none; background: rgba(255, 255, 255, 0.08); border-color: rgba(0, 217, 255, 0.3); box-shadow: 0 0 30px rgba(0, 217, 255, 0.15); }
        .input-bar::placeholder { color: rgba(255, 255, 255, 0.3); }
        .send-btn { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 217, 255, 0.1); border: 1px solid rgba(0, 217, 255, 0.3); cursor: pointer; transition: all 0.3s ease; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { background: rgba(0, 217, 255, 0.2); box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
        .send-btn::before { content: '→'; color: #00d9ff; font-size: 1.5rem; font-weight: 300; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); } 20%, 40%, 60%, 80% { transform: translateX(10px); } }
        @media (max-width: 768px) { header { padding: 1.5rem; } .input-container { padding: 1.5rem; } .logo { font-size: 1.2rem; } .orb-container { width: 300px; height: 300px; } .orb { width: 200px; height: 200px; } }
    </style>
</head>
<body>
    <div class="password-screen" id="password-screen">
        <div class="password-box">
            <div class="password-logo">HENRY</div>
            <div class="password-subtitle">AI COMMAND CENTER</div>
            <form id="password-form">
                <input type="password" id="password-input" class="password-input" placeholder="ACCESS CODE" autocomplete="off" autofocus />
                <button type="submit" class="password-submit">ENTER</button>
                <div class="password-error" id="password-error">ACCESS DENIED</div>
            </form>
        </div>
    </div>
    <div class="main-container">
        <header>
            <div class="logo">HENRY</div>
            <div class="status"><span class="status-dot"></span><span>ONLINE</span></div>
        </header>
        <div class="orb-container"><div class="orb"></div></div>
        <div class="center-content"><div class="voice-status" id="voice-status">READY</div></div>
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="input-bar" class="input-bar" placeholder="Message Henry..." rows="1"></textarea>
                <button class="send-btn" id="send-btn"></button>
            </div>
        </div>
    </div>
    <script>
        const PASSWORD = '@agenthenry123';
        const passwordScreen = document.getElementById('password-screen');
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');
        const mainContainer = document.querySelector('.main-container');
        if (sessionStorage.getItem('henryAuth') === 'true') { passwordScreen.classList.add('hidden'); } else { mainContainer.style.display = 'none'; }
        passwordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const entered = passwordInput.value;
            if (entered === PASSWORD) {
                sessionStorage.setItem('henryAuth', 'true');
                passwordScreen.classList.add('hidden');
                mainContainer.style.display = 'flex';
                passwordInput.value = '';
                passwordError.classList.remove('show');
                setTimeout(() => document.getElementById('input-bar').focus(), 500);
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
                passwordForm.style.animation = 'shake 0.5s';
                setTimeout(() => passwordForm.style.animation = '', 500);
            }
        });
        const inputBar = document.getElementById('input-bar');
        const sendBtn = document.getElementById('send-btn');
        const voiceStatus = document.getElementById('voice-status');
        inputBar.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px'; });
        function sendMessage() {
            const message = inputBar.value.trim();
            if (!message) return;
            voiceStatus.textContent = 'PROCESSING...';
            inputBar.value = '';
            inputBar.style.height = 'auto';
            setTimeout(() => { voiceStatus.textContent = 'READY'; }, 2000);
        }
        sendBtn.addEventListener('click', sendMessage);
        inputBar.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        if (sessionStorage.getItem('henryAuth') === 'true') { setTimeout(() => inputBar.focus(), 500); }
    </script>
</body>
</html>
