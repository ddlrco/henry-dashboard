<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENRY - AI Command Center</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #000; color: #fff; overflow: hidden; height: 100vh; }
        .password-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; align-items: center; justify-content: center; z-index: 9999; }
        .password-box { text-align: center; padding: 3rem 2.5rem; max-width: 400px; width: 90%; }
        .password-logo { font-size: 3rem; font-weight: 200; color: #00d9ff; margin-bottom: 0.5rem; letter-spacing: 0.3em; text-shadow: 0 0 30px rgba(0, 217, 255, 0.5); }
        .password-subtitle { color: rgba(255, 255, 255, 0.4); margin-bottom: 3rem; font-size: 0.875rem; font-weight: 300; letter-spacing: 0.15em; }
        .password-input { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(0, 217, 255, 0.3); border-radius: 8px; padding: 1rem 1.5rem; color: #fff; font-size: 1rem; text-align: center; letter-spacing: 0.2em; margin-bottom: 1.5rem; transition: all 0.3s; }
        .password-input:focus { outline: none; border-color: #00d9ff; box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); background: rgba(255, 255, 255, 0.08); }
        .password-submit { width: 100%; background: rgba(0, 217, 255, 0.1); border: 1px solid rgba(0, 217, 255, 0.5); padding: 1rem 2rem; border-radius: 8px; color: #00d9ff; font-weight: 500; cursor: pointer; transition: all 0.3s; font-size: 0.875rem; letter-spacing: 0.15em; }
        .password-submit:hover { background: rgba(0, 217, 255, 0.15); box-shadow: 0 0 30px rgba(0, 217, 255, 0.3); }
        .password-error { color: #f44; margin-top: 1rem; font-size: 0.875rem; opacity: 0; transition: opacity 0.3s; }
        .password-error.show { opacity: 1; }
        .hidden { display: none !important; }
        .main-container { height: 100vh; position: relative; }
        header { position: absolute; top: 0; left: 0; right: 0; padding: 2rem 3rem; display: flex; justify-content: space-between; align-items: center; z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 200; letter-spacing: 0.3em; color: #00d9ff; text-shadow: 0 0 20px rgba(0, 217, 255, 0.5); }
        .status { display: flex; align-items: center; gap: 0.75rem; font-size: 0.75rem; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.15em; text-transform: uppercase; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #0f8; box-shadow: 0 0 15px #0f8; animation: pulse-dot 2s ease-in-out infinite; }
        @keyframes pulse-dot { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        /* 3D Orb Canvas */
        #orb-canvas { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); z-index: 1; cursor: pointer; }
        
        .center-content { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); text-align: center; z-index: 2; margin-top: 300px; pointer-events: none; }
        .voice-status { font-size: 0.75rem; color: rgba(255, 255, 255, 0.6); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 300; }
        
        /* HUD Side Panels */
        .hud-panel { position: absolute; z-index: 50; padding: 1.5rem; background: rgba(0, 20, 40, 0.3); border: 1px solid rgba(0, 217, 255, 0.2); backdrop-filter: blur(10px); }
        .hud-left { top: 120px; left: 40px; width: 280px; }
        .hud-right { top: 120px; right: 40px; width: 280px; }
        .hud-title { font-size: 0.65rem; color: rgba(0, 217, 255, 0.8); letter-spacing: 0.2em; margin-bottom: 1rem; text-transform: uppercase; }
        .stat-bar { margin-bottom: 1rem; }
        .stat-label { font-size: 0.7rem; color: rgba(255, 255, 255, 0.5); margin-bottom: 0.4rem; }
        .stat-value { display: flex; align-items: center; gap: 0.5rem; font-size: 0.75rem; color: #fff; }
        .bar { flex: 1; height: 4px; background: rgba(255, 255, 255, 0.1); position: relative; overflow: hidden; }
        .bar-fill { height: 100%; background: linear-gradient(90deg, #00d9ff, #0080ff); box-shadow: 0 0 10px rgba(0, 217, 255, 0.5); transition: width 1s ease; }
        .waveform { display: flex; align-items: center; justify-content: space-between; height: 40px; gap: 2px; }
        .waveform-bar { width: 3px; background: rgba(0, 217, 255, 0.6); border-radius: 2px; transition: height 0.1s; }
        
        .input-container { position: absolute; bottom: 0; left: 0; right: 0; padding: 2rem 3rem 3rem; z-index: 100; }
        .input-wrapper { max-width: 800px; margin: 0 auto; position: relative; }
        .input-bar { width: 100%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 24px; padding: 1.25rem 5rem 1.25rem 2rem; color: #fff; font-size: 1rem; transition: all 0.3s; font-family: inherit; resize: none; min-height: 56px; max-height: 200px; }
        .input-bar:focus { outline: none; background: rgba(255, 255, 255, 0.08); border-color: rgba(0, 217, 255, 0.3); box-shadow: 0 0 30px rgba(0, 217, 255, 0.15); }
        .input-bar::placeholder { color: rgba(255, 255, 255, 0.3); }
        .send-btn { position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); width: 40px; height: 40px; border-radius: 50%; background: rgba(0, 217, 255, 0.1); border: 1px solid rgba(0, 217, 255, 0.3); cursor: pointer; transition: all 0.3s; display: flex; align-items: center; justify-content: center; }
        .send-btn:hover { background: rgba(0, 217, 255, 0.2); box-shadow: 0 0 20px rgba(0, 217, 255, 0.3); }
        .send-btn::before { content: '→'; color: #00d9ff; font-size: 1.5rem; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); } 20%, 40%, 60%, 80% { transform: translateX(10px); } }
        @media (max-width: 1200px) { .hud-panel { display: none; } }
    </style>
</head>
<body>
    <div class="password-screen" id="password-screen">
        <div class="password-box">
            <div class="password-logo">HENRY</div>
            <div class="password-subtitle">AI COMMAND CENTER</div>
            <form id="password-form">
                <input type="password" id="password-input" class="password-input" placeholder="ACCESS CODE" autocomplete="off" autofocus />
                <button type="submit" class="password-submit">ENTER</button>
                <div class="password-error" id="password-error">ACCESS DENIED</div>
            </form>
        </div>
    </div>
    <div class="main-container">
        <header>
            <div class="logo">HENRY</div>
            <div class="status"><span class="status-dot"></span><span>ONLINE</span></div>
        </header>
        <canvas id="orb-canvas"></canvas>
        <div class="center-content"><div class="voice-status" id="voice-status">TAP ORB TO SPEAK</div></div>
        
        <!-- HUD Panels -->
        <div class="hud-panel hud-left">
            <div class="hud-title">SYSTEM STATUS</div>
            <div class="stat-bar">
                <div class="stat-label">CPU</div>
                <div class="stat-value"><div class="bar"><div class="bar-fill" style="width: 67%"></div></div><span>67%</span></div>
            </div>
            <div class="stat-bar">
                <div class="stat-label">MEMORY</div>
                <div class="stat-value"><div class="bar"><div class="bar-fill" style="width: 42%"></div></div><span>42%</span></div>
            </div>
            <div class="stat-bar">
                <div class="stat-label">UPTIME</div>
                <div class="stat-value"><span id="uptime">00:00:00</span></div>
            </div>
            <div class="hud-title" style="margin-top: 1.5rem;">AUDIO LEVELS</div>
            <div class="waveform" id="waveform-left"></div>
        </div>
        
        <div class="hud-panel hud-right">
            <div class="hud-title">RESPONSE METRICS</div>
            <div class="stat-bar">
                <div class="stat-label">LATENCY</div>
                <div class="stat-value"><div class="bar"><div class="bar-fill" style="width: 15%"></div></div><span>15ms</span></div>
            </div>
            <div class="stat-bar">
                <div class="stat-label">CONFIDENCE</div>
                <div class="stat-value"><div class="bar"><div class="bar-fill" style="width: 94%"></div></div><span>94%</span></div>
            </div>
            <div class="hud-title" style="margin-top: 1.5rem;">SIGNAL STRENGTH</div>
            <div class="waveform" id="waveform-right"></div>
        </div>
        
        <div class="input-container">
            <div class="input-wrapper">
                <textarea id="input-bar" class="input-bar" placeholder="Message Henry..." rows="1"></textarea>
                <button class="send-btn" id="send-btn"></button>
            </div>
        </div>
    </div>
    <script>
        const PASSWORD = '@agenthenry123';
        const passwordScreen = document.getElementById('password-screen');
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');
        const mainContainer = document.querySelector('.main-container');
        if (sessionStorage.getItem('henryAuth') === 'true') { passwordScreen.classList.add('hidden'); initOrb(); } else { mainContainer.style.display = 'none'; }
        passwordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            if (passwordInput.value === PASSWORD) {
                sessionStorage.setItem('henryAuth', 'true');
                passwordScreen.classList.add('hidden');
                mainContainer.style.display = 'block';
                setTimeout(() => { initOrb(); document.getElementById('input-bar').focus(); }, 100);
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordForm.style.animation = 'shake 0.5s';
                setTimeout(() => passwordForm.style.animation = '', 500);
            }
        });
        
        // 3D Orb with Particles
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let angle = 0;
        let isListening = false;
        
        function initOrb() {
            canvas.width = 600;
            canvas.height = 600;
            for (let i = 0; i < 80; i++) {
                particles.push({
                    angle: (Math.PI * 2 * i) / 80,
                    radius: 120 + Math.random() * 40,
                    z: Math.random() * 100 - 50,
                    speed: 0.005 + Math.random() * 0.01,
                    size: 2 + Math.random() * 3,
                    opacity: 0.3 + Math.random() * 0.7
                });
            }
            animate();
        }
        
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const cx = canvas.width / 2;
            const cy = canvas.height / 2;
            
            // Draw main orb glow
            const glow = ctx.createRadialGradient(cx, cy, 40, cx, cy, 120);
            glow.addColorStop(0, 'rgba(0, 217, 255, 0.3)');
            glow.addColorStop(0.5, 'rgba(0, 217, 255, 0.1)');
            glow.addColorStop(1, 'transparent');
            ctx.fillStyle = glow;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw 3D sphere
            ctx.beginPath();
            ctx.arc(cx, cy, 80, 0, Math.PI * 2);
            const sphereGrad = ctx.createRadialGradient(cx - 20, cy - 20, 10, cx, cy, 80);
            sphereGrad.addColorStop(0, 'rgba(0, 217, 255, 0.6)');
            sphereGrad.addColorStop(0.5, 'rgba(0, 150, 255, 0.3)');
            sphereGrad.addColorStop(1, 'rgba(0, 100, 255, 0.1)');
            ctx.fillStyle = sphereGrad;
            ctx.fill();
            ctx.strokeStyle = 'rgba(0, 217, 255, 0.4)';
            ctx.lineWidth = 2;
            ctx.stroke();
            
            // Draw orbiting particles
            particles.sort((a, b) => a.z - b.z);
            particles.forEach(p => {
                p.angle += p.speed;
                const x = cx + Math.cos(p.angle) * p.radius;
                const y = cy + Math.sin(p.angle) * p.radius * 0.5 + Math.sin(p.z / 10 + angle) * 20;
                const scale = (p.z + 50) / 100;
                ctx.beginPath();
                ctx.arc(x, y, p.size * scale, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 217, 255, ${p.opacity * scale})`;
                ctx.fill();
            });
            
            angle += 0.01;
            requestAnimationFrame(animate);
        }
        
        // Voice Recognition
        const voiceStatus = document.getElementById('voice-status');
        const recognition = 'webkitSpeechRecognition' in window ? new webkitSpeechRecognition() : ('SpeechRecognition' in window ? new SpeechRecognition() : null);
        const synthesis = window.speechSynthesis;
        
        if (recognition) {
            recognition.continuous = false;
            recognition.lang = 'en-US';
            recognition.onstart = () => {
                isListening = true;
                voiceStatus.textContent = 'LISTENING...';
            };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                voiceStatus.textContent = 'PROCESSING...';
                setTimeout(() => {
                    const response = `You said: ${transcript}`;
                    speak(response);
                    voiceStatus.textContent = 'TAP ORB TO SPEAK';
                }, 1000);
            };
            recognition.onerror = () => {
                voiceStatus.textContent = 'ERROR - TAP TO RETRY';
                isListening = false;
            };
            recognition.onend = () => { isListening = false; };
        }
        
        function speak(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.rate = 1.1;
            utterance.pitch = 1;
            synthesis.speak(utterance);
        }
        
        canvas.addEventListener('click', () => {
            if (recognition && !isListening) {
                recognition.start();
            }
        });
        
        // Waveforms
        function initWaveforms() {
            const left = document.getElementById('waveform-left');
            const right = document.getElementById('waveform-right');
            for (let i = 0; i < 20; i++) {
                left.innerHTML += '<div class="waveform-bar"></div>';
                right.innerHTML += '<div class="waveform-bar"></div>';
            }
            animateWaveforms();
        }
        
        function animateWaveforms() {
            document.querySelectorAll('.waveform-bar').forEach(bar => {
                bar.style.height = (10 + Math.random() * 30) + 'px';
            });
            setTimeout(animateWaveforms, 150);
        }
        
        // Uptime
        const startTime = Date.now();
        setInterval(() => {
            const elapsed = Date.now() - startTime;
            const h = Math.floor(elapsed / 3600000);
            const m = Math.floor((elapsed % 3600000) / 60000);
            const s = Math.floor((elapsed % 60000) / 1000);
            document.getElementById('uptime').textContent = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
        }, 1000);
        
        // Input
        const inputBar = document.getElementById('input-bar');
        const sendBtn = document.getElementById('send-btn');
        inputBar.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = Math.min(this.scrollHeight, 200) + 'px'; });
        function sendMessage() {
            const msg = inputBar.value.trim();
            if (!msg) return;
            voiceStatus.textContent = 'PROCESSING...';
            inputBar.value = '';
            inputBar.style.height = 'auto';
            setTimeout(() => voiceStatus.textContent = 'TAP ORB TO SPEAK', 2000);
        }
        sendBtn.addEventListener('click', sendMessage);
        inputBar.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); } });
        
        if (sessionStorage.getItem('henryAuth') === 'true') { initWaveforms(); }
    </script>
</body>
</html>
