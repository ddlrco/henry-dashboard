<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HENRY - AI Command Center</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: #000000;
            color: #ffffff;
            overflow: hidden;
            height: 100vh;
        }

        /* Password Screen */
        .password-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 9999;
        }

        .password-box {
            text-align: center;
            padding: 3rem 2.5rem;
            max-width: 400px;
            width: 90%;
        }

        .password-logo {
            font-size: 3rem;
            font-weight: 200;
            color: #00d9ff;
            margin-bottom: 0.5rem;
            letter-spacing: 0.3em;
            text-shadow: 0 0 30px rgba(0, 217, 255, 0.5);
        }

        .password-subtitle {
            color: rgba(255, 255, 255, 0.4);
            margin-bottom: 3rem;
            font-size: 0.875rem;
            font-weight: 300;
            letter-spacing: 0.15em;
        }

        .password-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 217, 255, 0.3);
            border-radius: 8px;
            padding: 1rem 1.5rem;
            color: #ffffff;
            font-size: 1rem;
            text-align: center;
            letter-spacing: 0.2em;
            margin-bottom: 1.5rem;
            transition: all 0.3s ease;
        }

        .password-input:focus {
            outline: none;
            border-color: #00d9ff;
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
            background: rgba(255, 255, 255, 0.08);
        }

        .password-submit {
            width: 100%;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.5);
            padding: 1rem 2rem;
            border-radius: 8px;
            color: #00d9ff;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.875rem;
            letter-spacing: 0.15em;
        }

        .password-submit:hover {
            background: rgba(0, 217, 255, 0.15);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.3);
        }

        .password-error {
            color: #ff4444;
            margin-top: 1rem;
            font-size: 0.875rem;
            opacity: 0;
            transition: opacity 0.3s;
            font-weight: 300;
        }

        .password-error.show {
            opacity: 1;
        }

        .hidden {
            display: none !important;
        }

        /* Main Interface */
        .main-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            position: relative;
        }

        /* Header */
        header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            padding: 2rem 3rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 200;
            letter-spacing: 0.3em;
            color: #00d9ff;
            text-shadow: 0 0 20px rgba(0, 217, 255, 0.5);
        }

        .status {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 15px #00ff88;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Center Orb Canvas */
        #orb-canvas {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 1;
        }

        .center-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 2;
        }

        .voice-status {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.2em;
            text-transform: uppercase;
            margin-bottom: 20rem;
            font-weight: 300;
        }

        /* Input Bar (Bottom) */
        .input-container {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem 3rem 3rem 3rem;
            z-index: 100;
        }

        .input-wrapper {
            max-width: 800px;
            margin: 0 auto;
            position: relative;
        }

        .input-bar {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 1.25rem 5rem 1.25rem 2rem;
            color: #ffffff;
            font-size: 1rem;
            transition: all 0.3s ease;
            font-family: inherit;
            resize: none;
            min-height: 56px;
            max-height: 200px;
        }

        .input-bar:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 217, 255, 0.3);
            box-shadow: 0 0 30px rgba(0, 217, 255, 0.15);
        }

        .input-bar::placeholder {
            color: rgba(255, 255, 255, 0.3);
        }

        .send-btn {
            position: absolute;
            right: 1rem;
            top: 50%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(0, 217, 255, 0.1);
            border: 1px solid rgba(0, 217, 255, 0.3);
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .send-btn:hover {
            background: rgba(0, 217, 255, 0.2);
            box-shadow: 0 0 20px rgba(0, 217, 255, 0.3);
        }

        .send-btn::before {
            content: '→';
            color: #00d9ff;
            font-size: 1.5rem;
            font-weight: 300;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            10%, 30%, 50%, 70%, 90% { transform: translateX(-10px); }
            20%, 40%, 60%, 80% { transform: translateX(10px); }
        }

        @media (max-width: 768px) {
            header {
                padding: 1.5rem;
            }
            .input-container {
                padding: 1.5rem;
            }
            .logo {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Password Screen -->
    <div class="password-screen" id="password-screen">
        <div class="password-box">
            <div class="password-logo">HENRY</div>
            <div class="password-subtitle">AI COMMAND CENTER</div>
            <form id="password-form">
                <input 
                    type="password" 
                    id="password-input" 
                    class="password-input" 
                    placeholder="ACCESS CODE" 
                    autocomplete="off"
                    autofocus
                />
                <button type="submit" class="password-submit">ENTER</button>
                <div class="password-error" id="password-error">ACCESS DENIED</div>
            </form>
        </div>
    </div>

    <!-- Main Interface -->
    <div class="main-container">
        <header>
            <div class="logo">HENRY</div>
            <div class="status">
                <span class="status-dot"></span>
                <span>ONLINE</span>
            </div>
        </header>

        <!-- 3D Orb Canvas -->
        <canvas id="orb-canvas"></canvas>

        <div class="center-content">
            <div class="voice-status" id="voice-status">READY</div>
        </div>

        <!-- Input Bar -->
        <div class="input-container">
            <div class="input-wrapper">
                <textarea 
                    id="input-bar" 
                    class="input-bar" 
                    placeholder="Message Henry..."
                    rows="1"
                ></textarea>
                <button class="send-btn" id="send-btn"></button>
            </div>
        </div>
    </div>

    <script>
        // Password Protection
        const PASSWORD = '@agenthenry123';
        const passwordScreen = document.getElementById('password-screen');
        const passwordForm = document.getElementById('password-form');
        const passwordInput = document.getElementById('password-input');
        const passwordError = document.getElementById('password-error');
        const mainContainer = document.querySelector('.main-container');

        if (sessionStorage.getItem('henryAuth') === 'true') {
            passwordScreen.classList.add('hidden');
            initOrb();
        } else {
            mainContainer.style.display = 'none';
        }

        passwordForm.addEventListener('submit', (e) => {
            e.preventDefault();
            const entered = passwordInput.value;
            
            if (entered === PASSWORD) {
                sessionStorage.setItem('henryAuth', 'true');
                passwordScreen.classList.add('hidden');
                mainContainer.style.display = 'flex';
                passwordInput.value = '';
                passwordError.classList.remove('show');
                setTimeout(initOrb, 100);
            } else {
                passwordError.classList.add('show');
                passwordInput.value = '';
                passwordInput.focus();
                passwordForm.style.animation = 'shake 0.5s';
                setTimeout(() => passwordForm.style.animation = '', 500);
            }
        });

        // 3D Holographic Orb
        const canvas = document.getElementById('orb-canvas');
        const ctx = canvas.getContext('2d');
        let animationId;
        let particles = [];
        let angle = 0;

        function initOrb() {
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
            
            // Create particles for orb
            for (let i = 0; i < 300; i++) {
                particles.push({
                    angle: Math.random() * Math.PI * 2,
                    radius: 100 + Math.random() * 50,
                    speed: 0.001 + Math.random() * 0.002,
                    size: 3 + Math.random() * 4,
                    opacity: 0.7 + Math.random() * 0.3,
                    phase: Math.random() * Math.PI * 2
                });
            }
            
            animate();
        }

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            
            // Draw orb glow
            const gradient = ctx.createRadialGradient(centerX, centerY, 50, centerX, centerY, 200);
            gradient.addColorStop(0, 'rgba(0, 217, 255, 0.5)');
            gradient.addColorStop(0.5, 'rgba(0, 217, 255, 0.25)');
            gradient.addColorStop(1, 'rgba(0, 217, 255, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Draw rotating particles
            particles.forEach(particle => {
                particle.angle += particle.speed;
                particle.phase += 0.01;
                
                const pulseRadius = particle.radius + Math.sin(particle.phase) * 10;
                const x = centerX + Math.cos(particle.angle) * pulseRadius;
                const y = centerY + Math.sin(particle.angle) * pulseRadius * 0.5;
                
                ctx.beginPath();
                ctx.arc(x, y, particle.size, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(0, 217, 255, ${particle.opacity * (0.5 + Math.sin(particle.phase) * 0.5)})`;
                ctx.fill();
                
                // Connect nearby particles
                particles.forEach(other => {
                    const otherX = centerX + Math.cos(other.angle) * (other.radius + Math.sin(other.phase) * 10);
                    const otherY = centerY + Math.sin(other.angle) * (other.radius + Math.sin(other.phase) * 10) * 0.5;
                    const distance = Math.sqrt((x - otherX) ** 2 + (y - otherY) ** 2);
                    
                    if (distance < 100) {
                        ctx.beginPath();
                        ctx.moveTo(x, y);
                        ctx.lineTo(otherX, otherY);
                        ctx.strokeStyle = `rgba(0, 217, 255, ${0.1 * (1 - distance / 100)})`;
                        ctx.lineWidth = 0.5;
                        ctx.stroke();
                    }
                });
            });
            
            angle += 0.01;
            animationId = requestAnimationFrame(animate);
        }

        // Input handling
        const inputBar = document.getElementById('input-bar');
        const sendBtn = document.getElementById('send-btn');
        const voiceStatus = document.getElementById('voice-status');

        // Auto-resize textarea
        inputBar.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = Math.min(this.scrollHeight, 200) + 'px';
        });

        function sendMessage() {
            const message = inputBar.value.trim();
            if (!message) return;
            
            voiceStatus.textContent = 'PROCESSING...';
            inputBar.value = '';
            inputBar.style.height = 'auto';
            
            // Simulate response
            setTimeout(() => {
                voiceStatus.textContent = 'READY';
            }, 2000);
        }

        sendBtn.addEventListener('click', sendMessage);
        inputBar.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        // Focus input on load
        if (sessionStorage.getItem('henryAuth') === 'true') {
            setTimeout(() => inputBar.focus(), 500);
        }
    </script>
</body>
</html>
